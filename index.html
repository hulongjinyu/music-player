  {id:17,name:"月下思",artist:"萌宠音坊",category:"traditional",tags:["古风","思念","唯美"],duration:"4:55",plays:87400,emoji:"🌕"},

  {id:20,name:"午夜摇篮曲",artist:"AI创作",category:"cute",tags:["萌宠","摇篮曲","治愈"],duration:"4:05",plays:73200,emoji:"🌟"}
];

// === State ===
let currentSong = null;
let currentIndex = -1;
let isPlaying = false;
let repeatMode = 0;
let isShuffle = false;
let filteredSongs = [...songs];
let recentPlayed = [];
const audio = document.getElementById('audioPlayer');

// === Render ===
function renderSongList(list) {
  const container = document.getElementById('songList');
  container.innerHTML = list.map((s, i) => `
    <div class="song-item ${currentSong&&currentSong.id===s.id?'playing':''}" onclick="playSong(${s.id})">
      <div class="song-index">${i+1}</div>
      <div class="song-cover ${coverClasses[s.category]||''}">${s.emoji}</div>
      <div class="song-info">
        <div class="song-name">${s.name}</div>
        <div class="song-artist">${s.artist}</div>
        <div class="song-tags">${s.tags.map(t=>'<span class="song-tag-mini">'+t+'</span>').join('')}</div>
      </div>
      <div class="song-duration">${s.duration}</div>
      <button class="song-play-btn" onclick="event.stopPropagation();playSong(${s.id})">${currentSong&&currentSong.id===s.id&&isPlaying?'⏸':'▶'}</button>
    </div>
  `).join('');
}

function renderHotList() {
  const sorted = [...songs].sort((a,b)=>b.plays-a.plays).slice(0,8);
  document.getElementById('hotList').innerHTML = sorted.map((s,i) => `
    <div class="hot-item" onclick="playSong(${s.id})">
      <div class="hot-rank ${i<3?'top3':''}">${i+1}</div>
      <div class="hot-name">${s.emoji} ${s.name}</div>
      <div class="hot-plays">${(s.plays/10000).toFixed(1)}万</div>
    </div>
  `).join('');
}

function renderRecent() {
  const c = document.getElementById('recentList');
  if (!recentPlayed.length) {
    c.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">还没有播放记录</div>';
    return;
  }
  c.innerHTML = recentPlayed.map(s => `
    <div class="hot-item" onclick="playSong(${s.id})">
      <div class="hot-rank">${s.emoji}</div>
      <div class="hot-name">${s.name}</div>
      <div class="hot-plays">${s.duration}</div>
    </div>
  `).join('');
}

// === Filter & Sort ===
function filterSongs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const cat = document.getElementById('categorySelect').value;
  filteredSongs = songs.filter(s => {
    const mc = cat==='all'||s.category===cat;
    const ms = !search||s.name.toLowerCase().includes(search)||s.artist.toLowerCase().includes(search)||s.tags.some(t=>t.toLowerCase().includes(search));
    return mc && ms;
  });
  if (sort==='hot') filteredSongs.sort((a,b)=>b.plays-a.plays);
  else if (sort==='new') filteredSongs.sort((a,b)=>b.id-a.id);
  else filteredSongs.sort((a,b)=>a.name.localeCompare(b.name));
  renderSongList(filteredSongs);
}

function filterByCategory() {
  const val = document.getElementById('categorySelect').value;
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.cat-tag').forEach(t=>{
    if(t.getAttribute('onclick').includes("'"+val+"'")) t.classList.add('active');
  });
  filterSongs();
}

function selectCat(el, cat) {
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('categorySelect').value = cat;
  filterSongs();
}

// === Playback ===
function playSong(id) {
  const song = songs.find(s=>s.id===id);
  if (!song) return;
  if (currentSong && currentSong.id===id) { togglePlay(); return; }
  currentSong = song;
  currentIndex = filteredSongs.findIndex(s=>s.id===id);
  document.getElementById('playerName').textContent = song.name;
  document.getElementById('playerArtist').textContent = song.artist;
  document.getElementById('playerCover').textContent = song.emoji;
  document.getElementById('playerCover').className = 'player-cover spinning '+(coverClasses[song.category]||'');
  recentPlayed = recentPlayed.filter(s=>s.id!==id);
  recentPlayed.unshift(song);
  if (recentPlayed.length>8) recentPlayed.pop();
  renderRecent();
  isPlaying = true;
  document.getElementById('playBtn').innerHTML = '⏸';
  document.getElementById('totalTime').textContent = song.duration;
  simulateProgress(song);
  renderSongList(filteredSongs);
  document.title = '♫ '+song.name+' - '+song.artist+' | 萌宠音坊';
}

let progressInterval;
function simulateProgress(song) {
  clearInterval(progressInterval);
  const parts = song.duration.split(':');
  const totalSec = parseInt(parts[0])*60+parseInt(parts[1]);
  let cur = 0;
  progressInterval = setInterval(()=>{
    if (!isPlaying) return;
    cur++;
    if (cur>=totalSec) { clearInterval(progressInterval); onSongEnd(); return; }
    document.getElementById('progressFill').style.width = (cur/totalSec*100)+'%';
    const m = Math.floor(cur/60);
    const s = cur%60;
    document.getElementById('currentTime').textContent = m+':'+(s<10?'0':'')+s;
  },1000);
}

function onSongEnd() {
  if (repeatMode===2) { playSong(currentSong.id); return; }
  if (repeatMode===1||currentIndex<filteredSongs.length-1) { nextSong(); return; }
  isPlaying = false;
  document.getElementById('playBtn').innerHTML = '▶';
  document.getElementById('playerCover').classList.remove('spinning');
}

function togglePlay() {
  if (!currentSong) { if (filteredSongs.length) playSong(filteredSongs[0].id); return; }
  isPlaying = !isPlaying;
  document.getElementById('playBtn').innerHTML = isPlaying?'⏸':'▶';
  document.getElementById('playerCover').classList.toggle('spinning',isPlaying);
  renderSongList(filteredSongs);
}

function prevSong() {
  if (!filteredSongs.length) return;
  if (isShuffle) { playSong(filteredSongs[Math.floor(Math.random()*filteredSongs.length)].id); return; }
  currentIndex = (currentIndex-1+filteredSongs.length)%filteredSongs.length;
  playSong(filteredSongs[currentIndex].id);
}

function nextSong() {
  if (!filteredSongs.length) return;
  if (isShuffle) { playSong(filteredSongs[Math.floor(Math.random()*filteredSongs.length)].id); return; }
  currentIndex = (currentIndex+1)%filteredSongs.length;
  playSong(filteredSongs[currentIndex].id);
}

function toggleRepeat() {
  repeatMode = (repeatMode+1)%3;
  document.getElementById('repeatBtn').textContent = ['🔁','🔁','🔂'][repeatMode];
  document.getElementById('repeatBtn').classList.toggle('active',repeatMode>0);
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active',isShuffle);
}

function setVolume(v) { audio.volume = v/100; }
function toggleMute() { audio.muted = !audio.muted; }

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  document.getElementById('progressFill').style.width = ((e.clientX-rect.left)/rect.width*100)+'%';
}

// === Theme ===
function toggleTheme() {
  document.body.classList.toggle('light');
  document.querySelector('.theme-btn').textContent = document.body.classList.contains('light')?'☀️':'🌙';
}

// === Visualizer ===
function initVisualizer() {
  const vis = document.getElementById('visualizer');
  for (let i=0;i<12;i++) {
    const bar = document.createElement('div');
    bar.className = 'vis-bar';
    bar.style.height = '4px';
    vis.appendChild(bar);
  }
  animateVis();
}
function animateVis() {
  document.querySelectorAll('.vis-bar').forEach(bar=>{
    bar.style.height = (isPlaying ? Math.random()*20+4 : 4)+'px';
  });
  requestAnimationFrame(()=>setTimeout(animateVis,150));
}

// === Keyboard ===
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if (e.code==='Space') { e.preventDefault(); togglePlay(); }
  if (e.code==='ArrowLeft') prevSong();
  if (e.code==='ArrowRight') nextSong();
});

// === Init ===
filterSongs();
renderHotList();
initVisualizer();
</script>
